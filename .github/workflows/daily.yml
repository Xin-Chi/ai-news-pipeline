name: daily-ai-brief

# 目標台灣時間 6:30 觸發(UTC 前一天 22:30),也可手動觸發。
# GitHub Actions 的 schedule 不保證準時,實際觸發常常會晚 1~2 小時,
# 排早一點是為了讓延遲後的實際完成時間仍落在 8 點附近。
on:
  schedule:
    - cron: "30 22 * * *"
  workflow_dispatch:

permissions:
  contents: write   # 允許 commit 更新後的 docs/index.html

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
      - name: Commit updated page
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "chore: update daily AI brief"
          git push

